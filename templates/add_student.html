<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
</head>
<body>
    <h1>Add Student</h1>

    <form method="POST">
        <label>Name:</label><br>
        <input type="text" name="studentname" required><br><br>

        <label>SAP ID:</label><br>
        <input type="text" name="sapid" required><br><br>

        <label>Gender:</label><br>
        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select><br><br>

        <label>Marks:</label><br>
        <input type="number" step="0.01" name="marks" required><br><br>

        <button type="submit">Add Student</button>
    </form>

    <br>
    <a href="/">Back</a>
</body>
</html>
